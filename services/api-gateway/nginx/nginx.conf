worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limit zones (valores sobreescritos por envsubst en el contenedor)
    limit_req_zone $binary_remote_addr zone=mut:10m  rate=${RATE_LIMIT_MUT}r/m;
    limit_req_zone $binary_remote_addr zone=read:10m rate=${RATE_LIMIT_READ}r/m;
    limit_req_status 429;

    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"request_id":"$http_x_request_id",'
        '"upstream":"$upstream_addr",'
        '"duration":$request_time}';

    access_log /dev/stdout json_combined;
    error_log  /dev/stderr warn;

    # ─── upstream pools ──────────────────────────────────────────
    upstream ms_auth     { server ms-auth:4000; }
    upstream ms_crear    { server ms-crear:4001; }
    upstream ms_mod      { server ms-modificar:4002; }
    upstream ms_cons     { server ms-consultar:4003; }
    upstream ms_borrar   { server ms-borrar:4004; }
    upstream ms_log      { server ms-log:4005; }
    upstream ms_nlp      { server ms-nlp:5678; }
    upstream mw_validate { server localhost:3001; }

    # C-02 — límite de body por defecto (spec 012)
    client_max_body_size 1m;

    server {
        listen 80;

        # ─── subrequest de validación JWT ────────────────────────
        location = /_validate {
            internal;
            proxy_pass              http://mw_validate/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length   "";
            proxy_set_header        Authorization    $http_authorization;
            proxy_set_header        X-Original-URI   $request_uri;
            proxy_set_header        X-Request-Id     $http_x_request_id;
        }

        # ─── health (público) ────────────────────────────────────
        location = /health {
            proxy_pass http://mw_validate/health;
        }

        # ─── auth (público) ──────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=mut burst=5 nodelay;
            proxy_pass        http://ms_auth/api/v1/auth/;
            proxy_set_header  Host $host;
        }

        # ─── POST /api/v1/personas → ms-crear ────────────────────
        location = /api/v1/personas {
            client_max_body_size 6m; # foto máx. 2 MB + overhead multipart (C-02)
            auth_request /_validate;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $req_id     $upstream_http_x_request_id;

            limit_req zone=mut burst=5 nodelay;

            proxy_pass         http://ms_crear;
            proxy_set_header   X-User-Id    $user_id;
            proxy_set_header   X-User-Email $user_email;
            proxy_set_header   X-Request-Id $req_id;
        }

        # ─── GET|PUT|DELETE /api/v1/personas/:doc ────────────────
        location ~ ^/api/v1/personas/[0-9]+$ {
            auth_request /_validate;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $req_id     $upstream_http_x_request_id;

            proxy_set_header   X-User-Id    $user_id;
            proxy_set_header   X-User-Email $user_email;
            proxy_set_header   X-Request-Id $req_id;

            if ($request_method = GET) {
                limit_req zone=read burst=5 nodelay;
                proxy_pass http://ms_cons;
                break;
            }
            if ($request_method = PUT) {
                limit_req zone=mut burst=5 nodelay;
                proxy_pass http://ms_mod;
                break;
            }
            if ($request_method = DELETE) {
                limit_req zone=mut burst=5 nodelay;
                proxy_pass http://ms_borrar;
                break;
            }

            return 405;
        }

        # ─── GET /api/v1/logs ────────────────────────────────────
        location /api/v1/logs {
            auth_request /_validate;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $req_id     $upstream_http_x_request_id;

            limit_req zone=read burst=5 nodelay;

            proxy_pass         http://ms_log;
            proxy_set_header   X-User-Id    $user_id;
            proxy_set_header   X-User-Email $user_email;
            proxy_set_header   X-Request-Id $req_id;
        }

        # ─── RAG ─────────────────────────────────────────────────
        location /api/v1/rag/ {
            auth_request /_validate;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $req_id  $upstream_http_x_request_id;

            limit_req zone=read burst=5 nodelay;

            proxy_pass        http://ms_nlp/;
            proxy_set_header  X-User-Id    $user_id;
            proxy_set_header  X-Request-Id $req_id;
        }

        # ─── error pages problem+json ─────────────────────────────
        error_page 401 = @err_401;
        error_page 429 = @err_429;
        error_page 502 = @err_502;
        error_page 503 = @err_503;

        location @err_401 {
            default_type application/problem+json;
            return 401 '{"type":"https://problems/unauthorized","title":"No autenticado","status":401}';
        }
        location @err_429 {
            default_type application/problem+json;
            return 429 '{"type":"https://problems/rate-limited","title":"Demasiadas solicitudes","status":429}';
        }
        location @err_502 {
            default_type application/problem+json;
            return 502 '{"type":"https://problems/bad-gateway","title":"Respuesta inválida del servicio","status":502}';
        }
        location @err_503 {
            default_type application/problem+json;
            return 503 '{"type":"https://problems/service-unavailable","title":"Servicio no disponible","status":503}';
        }
    }
}
